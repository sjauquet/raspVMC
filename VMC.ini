[VMC]
device="/dev/ttyAMA0"		; serial device the VMC is attached to
lock="/tmp"
log="/var/log/VMC.log"
extraction_max_hours=8		; safety cap for VMCextractionWatchdog.py, see docs/EXTRACTION_MODE.md

[server]
bind=""				; "" = accept connections on all interfaces, "127.0.0.1" for localhost only
port=10000			; TCP port clients (CGI scripts, HA, ...) connect to

[client]
server="127.0.0.1"		; server address, used by clients running on the same Pi as the server

[socat]
PTY=/tmp/ttyVMC			; optional virtual serial device, e.g. for FHEM's comfoair driver

[debug]
level=3				; 0=nothing .. 2=config .. 3=client .. 8=frames (verbose)
log=/var/log/VMClog.log	; set to "none" to log to console only (avoids SD card wear)
heartbeat=/run/vmc/heartbeat.log	; set to "none" to disable
